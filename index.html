<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TideGuard - 실시간 전국 물때</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #fff; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 20px; color: #38bdf8; }
        .tide-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; padding: 20px; border: 1px solid #334155; }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2338bdf8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto min-h-screen pb-10">
        <header class="flex justify-between items-center mb-6">
            <div>
                <span class="chan-doong-signature">찬둥의</span>
                <h1 class="text-3xl font-black text-sky-400 italic tracking-tighter">TideGuard</h1>
            </div>
            <div class="text-right text-[10px] text-slate-500 font-bold uppercase text-sky-500">V2 Hybrid Mode</div>
        </header>

        <div class="mb-6">
            <label class="text-[10px] text-sky-400 font-bold ml-2 mb-1 block uppercase">출조 지역 선택</label>
            <select id="obsSelect" onchange="fetchTideData()" class="w-full bg-slate-800 border border-slate-700 text-white font-bold p-4 rounded-2xl outline-none focus:border-sky-500 transition shadow-lg">
                <option value="DT_0001">인천 (Incheon)</option>
                <option value="DT_0004">군산 (Gunsan)</option>
                <option value="DT_0005">목포 (Mokpo)</option>
                <option value="DT_0007">여수 (Yeosu)</option>
                <option value="DT_0009">부산 (Busan)</option>
                <option value="DT_0011">포항 (Pohang)</option>
                <option value="DT_0014">제주 (Jeju)</option>
                <option value="DT_0035">보령 (Boryeong)</option>
            </select>
        </div>

        <div id="mainDisplay" class="tide-card mb-4 text-center py-10 relative overflow-hidden">
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/90 flex items-center justify-center z-50 hidden">
                <div class="animate-pulse font-bold text-sky-400">데이터 수신 중...</div>
            </div>
            <p id="updateTime" class="text-[9px] text-slate-500 mb-1">REALTIME DATA BY CHAN-DOONG</p>
            <h2 id="statusTitle" class="text-3xl font-black text-white italic">SELECT AREA</h2>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="tide-card text-center p-5 border-b-4 border-b-sky-500">
                <p class="text-[10px] text-sky-400 font-bold uppercase mb-2">만조 (High)</p>
                <div id="highTide" class="text-sm font-black text-white whitespace-pre-line leading-tight">--:--</div>
            </div>
            <div class="tide-card text-center p-5 border-b-4 border-b-rose-500">
                <p class="text-[10px] text-rose-400 font-bold uppercase mb-2">간조 (Low)</p>
                <div id="lowTide" class="text-sm font-black text-white whitespace-pre-line leading-tight">--:--</div>
            </div>
        </div>

        <div class="space-y-4">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition">
                ☕ 찬둥에게 커피 후원하기
            </a>

            <div class="bg-[#1e293b] border border-slate-700 rounded-2xl p-4">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="오늘의 낚시 채비 검색" class="flex-grow p-3 border border-slate-800 rounded-xl text-sm bg-[#020617] text-white outline-none focus:border-sky-500">
                    <button type="submit" class="bg-sky-600 px-4 rounded-xl font-bold text-xs text-white active:bg-sky-700 transition">검색</button>
                </form>
                <p class="text-[8px] text-slate-500 mt-2 text-center">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
            </div>
        </div>
    </div>

    <script>
        // 발급받으신 인증키입니다.
        const API_KEY = "04c1a8f5901466efccb1971c7896bae7f1364ac500a238cfc25e7c1a7bb25e84";

        async function fetchTideData() {
            const obsCode = document.getElementById('obsSelect').value;
            const obsName = document.getElementById('obsSelect').options[document.getElementById('obsSelect').selectedIndex].text;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            
            try {
                const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
                
                // 최신 데이터 주소 (v2 기반)
                const baseUrl = "http://apis.data.go.kr/1192000/tidePreInfoService/getTidePreInfo";
                const url = `${baseUrl}?serviceKey=${API_KEY}&obsCode=${obsCode}&date=${today}&resultType=json`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                
                if (!proxyData.contents) throw new Error("API No Response");
                
                const data = JSON.parse(proxyData.contents);
                const items = data.response?.body?.items?.item;

                if(items) {
                    const itemList = Array.isArray(items) ? items : [items];
                    
                    const high = itemList.filter(i => i.tideLevel === "고조").map(i => i.tideTime.split(" ")[1].slice(0, 5));
                    const low = itemList.filter(i => i.tideLevel === "저조").map(i => i.tideTime.split(" ")[1].slice(0, 5));

                    document.getElementById('statusTitle').innerText = obsName;
                    document.getElementById('highTide').innerText = high.join("\n") || "정보 없음";
                    document.getElementById('lowTide').innerText = low.join("\n") || "정보 없음";
                    document.getElementById('updateTime').innerText = `갱신: ${new Date().toLocaleTimeString()}`;
                } else {
                    alert("데이터를 찾을 수 없습니다. 지역 또는 날짜를 확인해 주세요.");
                }
            } catch (error) {
                console.error(error);
                alert("통신 오류! API 키가 활성화되는 중이거나 서버 응답이 없습니다.");
            } finally {
                loading.style.display = 'none';
            }
        }
        window.onload = fetchTideData;
    </script>
</body>
</html>
