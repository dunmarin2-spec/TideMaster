<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>물때 조과 가드 - 찬둥 에디션</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #38bdf8; transform: rotate(-10deg); margin-bottom: -10px; margin-left: -10px; z-index: 50; }
        .tide-card { width: 100%; max-width: 380px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 25px; border: 1px solid #1e293b; display: flex; flex-direction: column; margin: 0 auto; border-radius: 24px; position: relative; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); overflow: hidden; }
        .tide-card::before { content: "TIDE"; position: absolute; top: -20px; right: -10px; font-size: 80px; font-weight: 900; color: rgba(56, 189, 248, 0.05); font-family: 'Black Han Sans', sans-serif; }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: #fff; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: #38bdf8; }
        .rendering .input-box { display: none !important; }
        .fixed-text { display: none; font-weight: 700; }
        .rendering .fixed-text { display: block !important; }
        .fish-badge { background: #38bdf8; color: #020617; padding: 2px 8px; border-radius: 6px; font-weight: 800; font-size: 11px; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="text-center mb-8 flex flex-col items-center">
            <span class="chan-doong-signature">찬둥의</span>
            <h1 class="text-3xl font-black text-white italic tracking-tighter">FISHING TIDE</h1>
            <p class="text-xs text-sky-400 mt-1 font-bold uppercase tracking-widest">Premium Tide Forecast</p>
        </header>

        <section id="captureArea" class="tide-card">
            <div class="flex justify-between items-start mb-6 border-b border-sky-900/30 pb-4 relative z-10">
                <div class="flex flex-col">
                    <span class="chan-doong-signature text-sm">찬둥의</span>
                    <p id="cardDate" class="text-[10px] text-sky-400 font-bold mb-1 uppercase"></p>
                    <input type="text" id="location" placeholder="출조지 입력 (예: 태안)" class="input-box text-xl font-black bg-transparent border-none p-0 w-40">
                    <div id="location_fixed" class="fixed-text text-2xl font-black text-white"></div>
                </div>
                <div class="text-right">
                    <div class="fish-badge">HIGH TIDE LV.4</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-2 flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> 만조 시간</p>
                    <input type="text" id="highTide" placeholder="00:00" class="input-box text-center font-bold">
                    <div id="highTide_fixed" class="fixed-text text-center text-xl font-black text-sky-400"></div>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-2 flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> 간조 시간</p>
                    <input type="text" id="lowTide" placeholder="00:00" class="input-box text-center font-bold">
                    <div id="lowTide_fixed" class="fixed-text text-center text-xl font-black text-sky-400"></div>
                </div>
            </div>

            <div class="mb-6">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-2">오늘의 공략 포인트</p>
                <input type="text" id="point" placeholder="예: 중들물 포인트 집중" class="input-box font-semibold text-sm">
                <div id="point_fixed" class="fixed-text text-white text-sm bg-sky-900/20 p-3 rounded-xl border border-sky-800/30"></div>
            </div>

            <div class="bg-gradient-to-r from-sky-600 to-blue-700 p-5 rounded-2xl text-center shadow-inner relative overflow-hidden">
                <p class="text-[10px] text-sky-100 font-bold uppercase mb-1 relative z-10">Expectation Catch</p>
                <div id="catchRate" class="text-3xl font-black text-white relative z-10 italic">입질 대박 예상!</div>
                <i data-lucide="waves" class="absolute right-[-10px] bottom-[-10px] w-20 h-20 text-white/10"></i>
            </div>
            
            <p class="text-[8px] text-center text-slate-500 mt-6 italic uppercase tracking-[0.2em]">Sea condition analyzed by Chan-doong</p>
        </section>

        <button onclick="generateReport()" class="w-full bg-sky-600 text-white font-black p-5 rounded-3xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition text-lg mt-8 mb-6">
            <i data-lucide="anchor" class="w-6 h-6"></i> 출조 리포트 생성 & 저장
        </button>

        <div class="flex flex-col gap-3">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow">☕ 찬둥에게 커피 후원하기</a>
            <div class="bg-[#1e293b] border border-slate-800 rounded-2xl p-5 shadow-sm">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="오늘의 낚시 채비 검색" class="flex-grow p-3 border border-slate-700 rounded-xl text-sm bg-[#0f172a] outline-none text-white">
                    <button type="submit" class="bg-sky-600 text-white px-5 rounded-xl font-bold text-xs">검색</button>
                </form>
                <p class="text-[9px] text-slate-500 mt-3 text-center italic">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {month: 'long', day: 'numeric', weekday: 'short'}) + " TIDE REPORT";

        async function generateReport() {
            const loc = document.getElementById('location').value;
            const high = document.getElementById('highTide').value;
            const low = document.getElementById('lowTide').value;
            const pt = document.getElementById('point').value;

            if(!loc || !high || !low) return alert('형님, 출조지랑 물때 시간은 적어주셔야죠!');

            document.getElementById('location_fixed').innerText = loc;
            document.getElementById('highTide_fixed').innerText = high;
            document.getElementById('lowTide_fixed').innerText = low;
            document.getElementById('point_fixed').innerText = pt || "안전 낚시가 최고입니다!";

            const area = document.getElementById('captureArea');
            area.classList.add('rendering');
            window.scrollTo(0, 0);

            const canvas = await html2canvas(area, { scale: 3, backgroundColor: '#0f172a' });
            area.classList.remove('rendering');

            const link = document.createElement('a');
            link.download = `TideReport_${loc}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            alert('형님! 대박 조과 기원 리포트가 저장됐습니다! 🎣🌊');
        }
    </script>
</body>
</html>
