<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReadySetFish - 스마트 채비 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #fff; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 20px; color: #38bdf8; }
        .tide-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; padding: 20px; border: 1px solid #334155; }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2338bdf8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto min-h-screen pb-10">
        <header class="flex justify-between items-center mb-6">
            <div>
                <span class="chan-doong-signature">찬둥의</span>
                <h1 class="text-3xl font-black text-sky-400 italic tracking-tighter">ReadySetFish</h1>
            </div>
            <div class="text-right text-[10px] text-slate-500 font-bold uppercase text-sky-500">Smart Gear Guide</div>
        </header>

        <div class="space-y-4 mb-6">
            <div>
                <label class="text-[10px] text-sky-400 font-bold ml-2 mb-1 block uppercase">대상어 선택</label>
                <select id="fishType" onchange="calculateGear()" class="w-full bg-slate-800 border border-slate-700 text-white font-bold p-4 rounded-2xl outline-none focus:border-sky-500 transition shadow-lg">
                    <option value="감성돔">감성돔 (Black Bream)</option>
                    <option value="뱅에돔">뱅에돔 (Girella)</option>
                    <option value="참돔">참돔 (Red Sea Bream)</option>
                    <option value="광어/우럭">광어/우럭 (Flatfish)</option>
                    <option value="주꾸미/갑오징어">주꾸미/갑오징어 (Squid)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-rose-400 font-bold ml-2 mb-1 block uppercase">낚시 장소</label>
                <select id="locationType" onchange="calculateGear()" class="w-full bg-slate-800 border border-slate-700 text-white font-bold p-4 rounded-2xl outline-none focus:border-rose-500 transition shadow-lg">
                    <option value="갯바위">갯바위 (Rock)</option>
                    <option value="방파제">방파제 (Breakwater)</option>
                    <option value="선상">선상 (Boat)</option>
                </select>
            </div>
        </div>

        <div id="resultCard" class="tide-card mb-6 text-center py-8 relative overflow-hidden border-2 border-sky-500/30">
            <p class="text-[10px] text-slate-500 mb-1 font-bold">CHANDUNG'S PICK</p>
            <h2 id="recommendTitle" class="text-2xl font-black text-white mb-4 italic">감성돔 황금 채비</h2>
            
            <div class="space-y-3 text-left max-w-[200px] mx-auto text-sm">
                <div class="flex justify-between border-b border-slate-700 pb-1">
                    <span class="text-slate-400">메인 라인</span>
                    <span id="mainLine" class="font-bold text-sky-300">2.5호</span>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-1">
                    <span class="text-slate-400">목줄</span>
                    <span id="leaderLine" class="font-bold text-sky-300">1.5호</span>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-1">
                    <span class="text-slate-400">바늘/찌</span>
                    <span id="hookSize" class="font-bold text-sky-300">감성돔 3호 / 0.8호</span>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="shopOnCoupang()" class="w-full flex items-center justify-center gap-2 bg-sky-600 text-white py-4 rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition">
                🚀 이 채비 세트 최저가 검색
            </button>

            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition">
                ☕ 찬둥에게 커피 후원하기
            </a>

            <div class="bg-[#1e293b] border border-slate-700 rounded-2xl p-4">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" id="coupangInput" name="q" placeholder="소모품 보충하기" class="flex-grow p-3 border border-slate-800 rounded-xl text-sm bg-[#020617] text-white outline-none">
                    <button type="submit" class="bg-slate-700 px-4 rounded-xl font-bold text-xs text-white">검색</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const gearData = {
            "감성돔": {
                "갯바위": ["2.5호 세미플로팅", "1.75호 카본", "3호 바늘 / 0.8호~1호 찌"],
                "방파제": ["2호 플로팅", "1.5호 카본", "2호 바늘 / 0.5호 찌"],
                "선상": ["3호", "2호 카본", "4호 바늘 / 막대찌"]
            },
            "뱅에돔": {
                "갯바위": ["1.75호 플로팅", "1.2호", "뱅에돔 4호 / 0찌"],
                "방파제": ["1.5호 플로팅", "0.8호", "뱅에돔 3호 / 제로찌"],
                "선상": ["2호", "1.5호", "뱅에돔 6호 / G2찌"]
            },
            "주꾸미/갑오징어": {
                "갯바위": ["합사 0.8호", "카본 2호", "왕눈이 에기 / 5호 봉돌"],
                "방파제": ["합사 0.6호", "카본 1.5호", "수평 에기 / 3호 봉돌"],
                "선상": ["합사 1호", "직결", "에자+에기 / 12~14호 봉돌"]
            }
            // 다른 어종 데이터도 이런 식으로 추가 가능합니다.
        };

        function calculateGear() {
            const fish = document.getElementById('fishType').value;
            const loc = document.getElementById('locationType').value;
            
            // 데이터가 없는 경우 기본값 처리
            const selected = gearData[fish]?.[loc] || ["정보 준비중", "정보 준비중", "정보 준비중"];

            document.getElementById('recommendTitle').innerText = `${fish} 황금 채비`;
            document.getElementById('mainLine').innerText = selected[0];
            document.getElementById('leaderLine').innerText = selected[1];
            document.getElementById('hookSize').innerText = selected[2];
            
            // 쿠팡 검색창 키워드 자동 변경
            document.getElementById('coupangInput').value = `${fish} ${loc} 채비`;
        }

        function shopOnCoupang() {
            const fish = document.getElementById('fishType').value;
            const loc = document.getElementById('locationType').value;
            const query = encodeURIComponent(`${fish} ${loc} 채비 세트`);
            const url = `https://www.coupang.com/np/search?q=${query}&channel=AF4757238`;
            window.open(url, '_blank');
        }

        window.onload = calculateGear;
    </script>
</body>
</html>
