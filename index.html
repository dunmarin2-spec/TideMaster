<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TideGuard - 실시간 물때</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #fff; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 20px; color: #38bdf8; }
        .tide-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; padding: 20px; border: 1px solid #334155; }
        .loading-shimmer { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto min-h-screen pb-10">
        <header class="flex justify-between items-center mb-6">
            <div>
                <span class="chan-doong-signature">찬둥의</span>
                <h1 class="text-3xl font-black text-sky-400 italic tracking-tighter">TideGuard</h1>
            </div>
            <button onclick="fetchTideData()" class="p-3 bg-sky-600 rounded-full active:scale-90 transition shadow-lg shadow-sky-900/20">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </header>

        <div id="mainDisplay" class="tide-card mb-6 text-center py-8 relative overflow-hidden">
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/80 flex items-center justify-center z-50">
                <div class="loading-shimmer font-bold text-sky-400">실시간 데이터 수신 중...</div>
            </div>
            <p id="obsName" class="text-sky-400 font-bold text-sm mb-1">관측소 위치 파악 중</p>
            <h2 id="todayTide" class="text-3xl font-black text-white mb-2">실시간 물때 분석</h2>
            <p id="updateTime" class="text-[10px] text-slate-500 italic">잠시만 기다려주세요</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="tide-card text-center p-5 border-t-4 border-t-sky-500">
                <p class="text-[10px] text-sky-400 font-bold uppercase mb-2">오늘의 만조</p>
                <div id="highTide" class="text-xl font-black text-white">--:--</div>
            </div>
            <div class="tide-card text-center p-5 border-t-4 border-t-rose-500">
                <p class="text-[10px] text-rose-400 font-bold uppercase mb-2">오늘의 간조</p>
                <div id="lowTide" class="text-xl font-black text-white">--:--</div>
            </div>
        </div>

        <div class="space-y-3">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow-lg">☕ 찬둥에게 커피 후원하기</a>
            <div class="bg-[#1e293b] border border-slate-700 rounded-2xl p-5 shadow-inner">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="실시간 핫딜 낚시 용품" class="flex-grow p-3 border border-slate-800 rounded-xl text-sm bg-[#020617] text-white outline-none focus:border-sky-500">
                    <button type="submit" class="bg-sky-600 px-4 rounded-xl font-bold text-xs">검색</button>
                </form>
                <p class="text-[8px] text-slate-500 mt-3 text-center italic">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // 형님의 마법 인증키
        const API_KEY = "04c1a8f5901466efccb1971c7896bae7f1364ac500a238cfc25e7c1a7bb25e84";

        async function fetchTideData() {
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';

            try {
                const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
                
                // 📍 형님, 여기는 가장 인기 있는 '인천' 관측소(DT_0001) 기준입니다. 
                // 나중에는 GPS 연동으로 관측소 코드를 바꿀 수 있게 업그레이드 가능합니다!
                const url = `https://www.khoa.go.kr/api/oceangrid/tideObsPreTab/search.do?ServiceKey=${API_KEY}&ObsCode=DT_0001&Date=${today}&ResultType=json`;

                const response = await fetch(url);
                const data = await response.json();

                if(data.result && data.result.data) {
                    const tideList = data.result.data;
                    let high = [];
                    let low = [];

                    tideList.forEach(item => {
                        if(item.tide_level === '고조') high.push(item.tide_time.slice(11, 16));
                        if(item.tide_level === '저조') low.push(item.tide_time.slice(11, 16));
                    });

                    document.getElementById('obsName').innerText = "📍 인천항 관측소 데이터";
                    document.getElementById('todayTide').innerText = "데이터 분석 완료";
                    document.getElementById('highTide').innerText = high.join(" / ") || "정보 없음";
                    document.getElementById('lowTide').innerText = low.join(" / ") || "정보 없음";
                    document.getElementById('updateTime').innerText = `최신 갱신: ${new Date().toLocaleTimeString()}`;
                }
            } catch (error) {
                console.error(error);
                alert("서버 연결 실패! 잠시 후 다시 시도해 주세요.");
            } finally {
                loading.style.display = 'none';
            }
        }

        window.onload = fetchTideData;
    </script>
</body>
</html>
