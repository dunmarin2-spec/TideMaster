<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TideGuard - 실시간 바다낚시지수</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #fff; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 20px; color: #38bdf8; }
        .tide-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; padding: 20px; border: 1px solid #334155; }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2338bdf8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto min-h-screen pb-10">
        <header class="flex justify-between items-center mb-6">
            <div>
                <span class="chan-doong-signature">찬둥의</span>
                <h1 class="text-3xl font-black text-sky-400 italic tracking-tighter">TideGuard</h1>
            </div>
            <div class="text-right text-[10px] text-slate-500 font-bold uppercase text-sky-500">Fishing V2 Mode</div>
        </header>

        <div class="mb-6">
            <label class="text-[10px] text-sky-400 font-bold ml-2 mb-1 block uppercase">출조 지역 선택</label>
            <select id="obsSelect" onchange="fetchTideData()" class="w-full bg-slate-800 border border-slate-700 text-white font-bold p-4 rounded-2xl outline-none focus:border-sky-500 transition shadow-lg">
                <option value="인천">인천 (Incheon)</option>
                <option value="부산">부산 (Busan)</option>
                <option value="제주">제주 (Jeju)</option>
                <option value="여수">여수 (Yeosu)</option>
                <option value="목포">목포 (Mokpo)</option>
                <option value="군산">군산 (Gunsan)</option>
                <option value="포항">포항 (Pohang)</option>
                <option value="울산">울산 (Ulsan)</option>
            </select>
        </div>

        <div id="mainDisplay" class="tide-card mb-4 text-center py-10 relative overflow-hidden">
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/90 flex items-center justify-center z-50 hidden">
                <div class="animate-pulse font-bold text-sky-400">보안 서버 우회 통신 중...</div>
            </div>
            <p id="updateTime" class="text-[9px] text-slate-500 mb-1">REALTIME DATA BY CHAN-DOONG</p>
            <h2 id="statusTitle" class="text-3xl font-black text-white italic">SELECT AREA</h2>
            <div id="fishingGrade" class="mt-4 text-xl font-bold text-sky-400">조과 지수 로딩 중...</div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="tide-card text-center p-5 border-b-4 border-b-sky-500">
                <p class="text-[10px] text-sky-400 font-bold uppercase mb-2">물때/수온</p>
                <div id="tideInfo" class="text-sm font-bold text-white whitespace-pre-line">--</div>
            </div>
            <div class="tide-card text-center p-5 border-b-4 border-b-rose-500">
                <p class="text-[10px] text-rose-400 font-bold uppercase mb-2">파고/풍속</p>
                <div id="weatherInfo" class="text-sm font-bold text-white whitespace-pre-line">--</div>
            </div>
        </div>

        <div class="space-y-4">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition">☕ 찬둥에게 커피 후원하기</a>
            
            <div class="bg-[#1e293b] border border-slate-700 rounded-2xl p-4">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="낚시 채비 검색" class="flex-grow p-3 border border-slate-800 rounded-xl text-sm bg-[#020617] text-white outline-none">
                    <button type="submit" class="bg-sky-600 px-4 rounded-xl font-bold text-xs text-white">검색</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "04c1a8f5901466efccb1971c7896bae7f1364ac500a238cfc25e7c1a7bb25e84";

        async function fetchTideData() {
            const obsName = document.getElementById('obsSelect').value;
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            
            try {
                const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
                
                // 이미지에 나온 정보대로 주소 재조립 (1192136 서비스 전용)
                const baseUrl = "https://apis.data.go.kr/1192136/fcstFishingv2/GetFcstFishingApiServicev2";
                const url = `${baseUrl}?serviceKey=${API_KEY}&gridCode=${encodeURIComponent(obsName)}&date=${today}&type=json`;
                
                // Allorigins 프록시 사용
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                const data = JSON.parse(proxyData.contents);

                if(data.response && data.response.body && data.response.body.items) {
                    const item = data.response.body.items.item[0];

                    document.getElementById('statusTitle').innerText = obsName;
                    // API 필드명은 매뉴얼에 따라 waterTemp, waveHeight 등으로 추정하여 매핑
                    document.getElementById('fishingGrade').innerText = `종합지수: ${item.fishingGrade || '정보없음'}`;
                    document.getElementById('tideInfo').innerText = `수온: ${item.waterTemp || '-'}°C\n대상: ${item.targetName || '감성돔'}`;
                    document.getElementById('weatherInfo').innerText = `파고: ${item.waveHeight || '-'}m\n풍속: ${item.windSpeed || '-'}m/s`;
                    document.getElementById('updateTime').innerText = `갱신: ${new Date().toLocaleTimeString()}`;
                } else {
                    alert("데이터를 찾을 수 없습니다. (지역명 확인 필요)");
                }
            } catch (error) {
                console.error(error);
                alert("통신 오류! API 발급 직후에는 활성화까지 시간이 걸릴 수 있습니다.");
            } finally {
                loading.style.display = 'none';
            }
        }
        window.onload = fetchTideData;
    </script>
</body>
</html>
